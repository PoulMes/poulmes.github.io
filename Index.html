<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расписание + ДЗ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f0e7;
      --card: rgba(255, 252, 247, 0.88);
      --card-strong: rgba(255, 252, 247, 0.97);
      --text: #1f1814;
      --muted: #6e6157;
      --accent: #b74d23;
      --accent-strong: #8d3815;
      --accent-soft: rgba(183, 77, 35, 0.12);
      --line: rgba(93, 66, 50, 0.12);
      --ok: #2f7f5f;
      --warn: #ad5e16;
      --danger: #8e3440;
      --shadow: 0 24px 64px rgba(78, 42, 19, 0.18);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Bahnschrift", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 30%),
        radial-gradient(circle at bottom right, rgba(245, 192, 154, 0.34), transparent 25%),
        linear-gradient(140deg, #efe0cd 0%, #f7f0e7 48%, #ead8c3 100%);
    }

    .page {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero,
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      overflow: hidden;
      position: relative;
      padding: 24px;
      margin-bottom: 16px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -40px -60px auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(183, 77, 35, 0.14), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(28px, 6vw, 44px);
      line-height: 0.96;
      letter-spacing: -0.04em;
      max-width: 520px;
    }

    .hero p {
      max-width: 600px;
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(93, 66, 50, 0.08);
    }

    .stat-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat strong {
      font-size: 20px;
      line-height: 1.2;
    }

    .tabbar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab {
      border: 1px solid transparent;
      border-radius: 18px;
      padding: 14px 12px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--muted);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .tab.active {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-1px);
    }

    .panel {
      padding: 18px;
    }

    .screen {
      display: none;
      animation: fade-in 0.22s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .hint {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 700;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .lesson-card,
    .day-card,
    .homework-card,
    .template-card,
    .setting-card {
      padding: 16px;
      border-radius: 20px;
      background: var(--card-strong);
      border: 1px solid var(--line);
    }

    .lesson-card.current {
      background: linear-gradient(135deg, rgba(183, 77, 35, 0.16), rgba(255, 255, 255, 0.96));
      border-color: rgba(183, 77, 35, 0.25);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .lesson-main,
    .homework-main {
      flex: 1 1 280px;
    }

    .lesson-title,
    .homework-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .lesson-meta,
    .homework-meta,
    .small {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      background: rgba(31, 24, 20, 0.08);
    }

    .status-planned { color: var(--muted); }
    .status-was { color: var(--ok); background: rgba(47, 127, 95, 0.12); }
    .status-cancelled { color: var(--danger); background: rgba(142, 52, 64, 0.12); }
    .status-changed { color: var(--warn); background: rgba(173, 94, 22, 0.12); }
    .status-added { color: var(--accent-strong); background: rgba(183, 77, 35, 0.12); }

    .grid-2,
    .grid-3 {
      display: grid;
      gap: 14px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(93, 66, 50, 0.15);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(183, 77, 35, 0.4);
      box-shadow: 0 0 0 4px rgba(183, 77, 35, 0.12);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-switcher {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
    }

    .day-arrow {
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 14px;
      background: rgba(183, 77, 35, 0.12);
      color: var(--accent-strong);
      font: inherit;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
    }

    .day-arrow:disabled {
      opacity: 0.36;
      cursor: default;
    }

    .day-switcher-meta {
      flex: 1;
      text-align: center;
    }

    .day-switcher-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lesson-shell {
      display: grid;
      gap: 10px;
    }

    .dragging {
      opacity: 0.48;
    }

    .drag-handle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(183, 77, 35, 0.1);
      color: var(--accent-strong);
      font-size: 20px;
      cursor: grab;
      user-select: none;
    }

    .lesson-homework {
      display: grid;
      gap: 10px;
      padding-top: 6px;
    }

    .homework-mini {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(93, 66, 50, 0.08);
    }

    .compact-schedule {
      display: grid;
      gap: 8px;
      height: clamp(320px, calc(100vh - 240px), 720px);
      overflow: auto;
      padding: 6px 4px 6px 0;
      align-content: start;
    }

    .compact-schedule.future .compact-item {
      opacity: 1;
    }

    .compact-item {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(93, 66, 50, 0.08);
      opacity: 0.34;
    }

    .compact-item.active {
      opacity: 1;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(247, 225, 208, 0.92));
      border-color: rgba(183, 77, 35, 0.18);
    }

    .compact-item.current {
      opacity: 1;
    }

    .compact-item-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .compact-item-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .compact-item-details {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(93, 66, 50, 0.08);
    }

    .compact-item.current .compact-item-details {
      border-top-color: rgba(183, 77, 35, 0.18);
    }

    .slot-editor {
      display: grid;
      gap: 10px;
    }

    .slot-editor-item {
      display: grid;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(93, 66, 50, 0.08);
      background: rgba(255, 255, 255, 0.76);
    }

    .slot-editor-item.empty {
      background: rgba(255, 255, 255, 0.58);
    }

    .slot-editor-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .slot-editor-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .slot-editor-empty {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .settings-menu {
      display: grid;
      gap: 14px;
    }

    .settings-nav {
      width: 100%;
      border: 1px solid rgba(183, 77, 35, 0.12);
      border-radius: 22px;
      padding: 18px 20px;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.24), transparent 34%),
        linear-gradient(135deg, #bc5428 0%, #9f4119 100%);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 18px 34px rgba(132, 54, 22, 0.18);
    }

    .settings-nav-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .settings-nav-title {
      display: block;
      font-size: 18px;
      line-height: 1.15;
    }

    .settings-nav-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      font-size: 18px;
      font-weight: 700;
    }

    .settings-nav-text {
      display: block;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 500;
    }

    .settings-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    button.action,
    button.ghost,
    button.danger {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease;
    }

    button.action {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }

    button.ghost {
      color: var(--accent-strong);
      background: rgba(183, 77, 35, 0.1);
    }

    button.danger {
      color: var(--danger);
      background: rgba(142, 52, 64, 0.1);
    }

    button.action:hover,
    button.ghost:hover,
    button.danger:hover,
    .tab:hover {
      transform: translateY(-1px);
    }

    .editor-item,
    .template-item,
    .homework-item {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(247, 240, 231, 0.7);
      border: 1px solid rgba(93, 66, 50, 0.08);
    }

    .switch {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line);
    }

    .switch input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin: 0;
      accent-color: var(--accent);
    }

    .empty {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--muted);
      text-align: center;
      border: 1px dashed rgba(93, 66, 50, 0.18);
    }

    .footer-bar {
      position: sticky;
      bottom: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(31, 24, 20, 0.9);
      color: #fff;
      box-shadow: 0 16px 42px rgba(31, 24, 20, 0.24);
    }

    .footer-status {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.76);
    }

    @media (max-width: 760px) {
      .stats,
      .tabbar,
      .settings-menu,
      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .footer-bar {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="tabbar" id="tabbar">
      <button class="tab active" data-tab="today" type="button">Текущее расписание</button>
      <button class="tab" data-tab="settings" type="button">Настройки</button>
    </nav>

    <section class="panel">
      <div class="screen active" id="screen-today"></div>
      <div class="screen" id="screen-settings"></div>
    </section>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const WEEKDAY_KEYS = [
      "monday",
      "tuesday",
      "wednesday",
      "thursday",
      "friday",
      "saturday",
      "sunday"
    ];

    const DEFAULT_SETTINGS = {
      notifications: true,
      show_current_lesson: true,
      subjects: [],
      lesson_times: [
        { start: "08:30", end: "09:15" },
        { start: "09:25", end: "10:10" },
        { start: "10:20", end: "11:05" },
        { start: "11:25", end: "12:10" },
        { start: "12:20", end: "13:05" },
        { start: "13:15", end: "14:00" },
        { start: "14:10", end: "14:55" },
        { start: "15:05", end: "15:50" }
      ]
    };

    const DEFAULT_TEMPLATE = {
      monday: [],
      tuesday: [],
      wednesday: [],
      thursday: [],
      friday: [],
      saturday: [],
      sunday: []
    };

    const STATUS_LABELS = {
      planned: "По плану",
      was: "Прошёл",
      cancelled: "Отменён",
      changed: "Замена",
      added: "Добавлен"
    };

    const state = {
      raw: null,
      snapshot: null,
      activeTab: "today",
      activeSettingsTab: "menu",
      selectedDay: null,
      draggedLessonId: null,
      scheduleEditMode: false,
      selectedCompactKey: null,
      compactReturnTimer: null,
      compactInputFocused: false,
      dirty: false
    };

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function decodeBase64Utf8(encoded) {
      const binary = atob(encoded.replace(/-/g, "+").replace(/_/g, "/"));
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return new TextDecoder("utf-8").decode(bytes);
    }

    function decodePayload() {
      const hash = window.location.hash.replace(/^#/, "");
      const params = new URLSearchParams(hash);
      const encoded = params.get("app");
      if (!encoded) {
        return {
          week_start: mondayOf(new Date()).toISOString().slice(0, 10),
          week_dates: buildWeekDates(mondayOf(new Date()).toISOString().slice(0, 10)),
          today: new Date().toISOString().slice(0, 10),
          template: clone(DEFAULT_TEMPLATE),
          days: {},
          homework: {},
          settings: clone(DEFAULT_SETTINGS),
          labels: { weekdays: {}, statuses: clone(STATUS_LABELS) },
          current_lesson: null
        };
      }

      try {
        const jsonText = decodeBase64Utf8(encoded);
        return JSON.parse(jsonText);
      } catch (error) {
        console.error("Payload decode failed", error);
        return {
          week_start: mondayOf(new Date()).toISOString().slice(0, 10),
          week_dates: buildWeekDates(mondayOf(new Date()).toISOString().slice(0, 10)),
          today: new Date().toISOString().slice(0, 10),
          template: clone(DEFAULT_TEMPLATE),
          days: {},
          homework: {},
          settings: clone(DEFAULT_SETTINGS),
          labels: { weekdays: {}, statuses: clone(STATUS_LABELS) },
          current_lesson: null
        };
      }
    }

    function mondayOf(inputDate) {
      const date = new Date(inputDate);
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      date.setDate(date.getDate() + diff);
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function buildWeekDates(weekStart) {
      const start = new Date(`${weekStart}T00:00:00`);
      return Array.from({ length: 7 }, (_, index) => {
        const next = new Date(start);
        next.setDate(start.getDate() + index);
        return next.toISOString().slice(0, 10);
      });
    }

    function dateToWeekdayKey(dayIso) {
      const parsed = new Date(`${dayIso}T12:00:00`);
      const index = (parsed.getDay() + 6) % 7;
      return WEEKDAY_KEYS[index];
    }

    function formatHumanDate(dayIso) {
      return new Intl.DateTimeFormat("ru-RU", {
        weekday: "long",
        day: "numeric",
        month: "long"
      }).format(new Date(`${dayIso}T12:00:00`));
    }

    function formatWeekRange(weekStart) {
      const dates = buildWeekDates(weekStart);
      const start = new Date(`${dates[0]}T12:00:00`);
      const end = new Date(`${dates[6]}T12:00:00`);
      const formatter = new Intl.DateTimeFormat("ru-RU", {
        day: "2-digit",
        month: "2-digit"
      });
      return `${formatter.format(start)} - ${formatter.format(end)}`;
    }

    function dayIsoFromDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function getTomorrowIso(dayIso) {
      const date = new Date(`${dayIso}T12:00:00`);
      date.setDate(date.getDate() + 1);
      return dayIsoFromDate(date);
    }

    function getScheduleDates() {
      const todayIso = state.snapshot?.today || dayIsoFromDate(new Date());
      return [todayIso, getTomorrowIso(todayIso)];
    }

    function parseTimeString(value) {
      const [hour = "08", minute = "30"] = String(value || "08:30").split(":");
      return { hour: Number(hour), minute: Number(minute) };
    }

    function pad(number) {
      return String(number).padStart(2, "0");
    }

    function defaultLessonTimes() {
      return clone(DEFAULT_SETTINGS.lesson_times);
    }

    function normalizeLessonTimes(rawItems) {
      if (!Array.isArray(rawItems)) {
        return defaultLessonTimes();
      }

      const normalized = rawItems
        .filter((item) => item && typeof item === "object")
        .map((item) => {
          const start = `${pad(parseTimeString(item.start).hour)}:${pad(parseTimeString(item.start).minute)}`;
          const end = `${pad(parseTimeString(item.end).hour)}:${pad(parseTimeString(item.end).minute)}`;
          return { start, end };
        })
        .filter((item) => item.start < item.end);

      return normalized.length ? normalized : defaultLessonTimes();
    }

    function buildGeneratedTimeSlot(index) {
      const lessonTimes = defaultLessonTimes();
      if (index < lessonTimes.length) {
        return `${lessonTimes[index].start}-${lessonTimes[index].end}`;
      }

      const last = lessonTimes[lessonTimes.length - 1];
      let start = new Date();
      let end = new Date();
      const parsedLastStart = parseTimeString(last.start);
      const parsedLastEnd = parseTimeString(last.end);
      start.setHours(parsedLastStart.hour, parsedLastStart.minute, 0, 0);
      end.setHours(parsedLastEnd.hour, parsedLastEnd.minute, 0, 0);
      const duration = end.getTime() - start.getTime();

      for (let cursor = lessonTimes.length; cursor <= index; cursor += 1) {
        start = new Date(end.getTime() + 10 * 60000);
        end = new Date(start.getTime() + duration);
      }

      return `${pad(start.getHours())}:${pad(start.getMinutes())}-${pad(end.getHours())}:${pad(end.getMinutes())}`;
    }

    function buildTimeSlotFromSettings(index, settings) {
      const lessonTimes = normalizeLessonTimes(settings.lesson_times);
      if (index < lessonTimes.length) {
        return `${lessonTimes[index].start}-${lessonTimes[index].end}`;
      }
      return buildGeneratedTimeSlot(index);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    function normalizeHomework(rawItems) {
      if (!Array.isArray(rawItems)) {
        return [];
      }

      return rawItems
        .map((item) => ({
          id: item.id || crypto.randomUUID(),
          lesson_id: String(item.lesson_id || "").trim(),
          lesson: String(item.lesson || "").trim(),
          task: String(item.task || "").trim(),
          done: Boolean(item.done)
        }))
        .filter((item) => item.lesson || item.task);
    }

    function normalizeDay(rawItems, dayIso, settings, template) {
      const items = Array.isArray(rawItems)
        ? rawItems
        : (template[dateToWeekdayKey(dayIso)] || []).map((lesson, index) => ({
            lesson: typeof lesson === "object" ? lesson.lesson : lesson,
            cabinet: typeof lesson === "object" ? lesson.cabinet : "",
            status: "planned",
            slot: index + 1
          }));

      return items
        .map((item, index) => {
          const parsedSlot = Number(item?.slot);
          const slot = Number.isFinite(parsedSlot) && parsedSlot > 0 ? parsedSlot : index + 1;
          return {
            id: item.id || crypto.randomUUID(),
            lesson: String(item.lesson || "").trim(),
            cabinet: String(item.cabinet || "").trim(),
            status: STATUS_LABELS[item.status] ? item.status : "planned",
            slot,
            time: buildTimeSlotFromSettings(slot - 1, settings)
          };
        })
        .filter((item) => item.lesson)
        .sort((left, right) => left.slot - right.slot || left.lesson.localeCompare(right.lesson));
    }

    function normalizeSettings(rawSettings) {
      const settings = {
        ...clone(DEFAULT_SETTINGS),
        ...(rawSettings || {})
      };

      if (Array.isArray(rawSettings?.lesson_times)) {
        settings.lesson_times = normalizeLessonTimes(rawSettings.lesson_times);
      } else {
        const legacyDuration = Math.max(5, Number(rawSettings?.lesson_duration || 45));
        const legacyBreak = Math.max(0, Number(rawSettings?.break_duration || 10));
        const legacyStart = parseTimeString(rawSettings?.start_time || "08:30");
        const lessonTimes = [];
        let start = new Date();
        start.setHours(legacyStart.hour, legacyStart.minute, 0, 0);

        for (let index = 0; index < DEFAULT_SETTINGS.lesson_times.length; index += 1) {
          const end = new Date(start.getTime() + legacyDuration * 60000);
          lessonTimes.push({
            start: `${pad(start.getHours())}:${pad(start.getMinutes())}`,
            end: `${pad(end.getHours())}:${pad(end.getMinutes())}`
          });
          start = new Date(end.getTime() + legacyBreak * 60000);
        }

        settings.lesson_times = lessonTimes;
      }

      settings.notifications = Boolean(settings.notifications);
      settings.show_current_lesson = Boolean(settings.show_current_lesson);
      settings.subjects = normalizeSubjects(settings.subjects);
      return settings;
    }

    function normalizeSubjects(rawItems) {
      if (!Array.isArray(rawItems)) {
        return [];
      }

      return rawItems
        .filter((item) => item && typeof item === "object")
        .map((item) => ({
          name: String(item.name || "").trim(),
          cabinet: String(item.cabinet || "").trim()
        }))
        .filter((item) => item.name);
    }

    function normalizeTemplateLessonEntry(rawItem) {
      if (rawItem && typeof rawItem === "object") {
        return {
          lesson: String(rawItem.lesson || "").trim(),
          cabinet: String(rawItem.cabinet || "").trim()
        };
      }

      return {
        lesson: String(rawItem || "").trim(),
        cabinet: ""
      };
    }

    function normalizeTemplate(rawTemplate) {
      const template = clone(DEFAULT_TEMPLATE);
      WEEKDAY_KEYS.forEach((weekday) => {
        const items = Array.isArray(rawTemplate?.[weekday]) ? rawTemplate[weekday] : [];
        template[weekday] = items
          .map((item) => normalizeTemplateLessonEntry(item))
          .filter((item) => item.lesson);
      });
      return template;
    }

    function ensureSnapshot() {
      const payload = decodePayload();
      const template = normalizeTemplate(payload.template || {});
      const settings = normalizeSettings(payload.settings || {});
      const weekDates = Array.isArray(payload.week_dates)
        ? payload.week_dates
        : buildWeekDates(payload.week_start || mondayOf(new Date()).toISOString().slice(0, 10));

      const days = {};
      const homework = {};

      weekDates.forEach((dayIso) => {
        days[dayIso] = normalizeDay(payload.days?.[dayIso], dayIso, settings, template);
        homework[dayIso] = normalizeHomework(payload.homework?.[dayIso]);
      });

      const todayIso = payload.today || dayIsoFromDate(new Date());
      const tomorrowIso = getTomorrowIso(todayIso);
      [todayIso, tomorrowIso].forEach((dayIso) => {
        if (!days[dayIso]) {
          days[dayIso] = normalizeDay(payload.days?.[dayIso], dayIso, settings, template);
        }
        if (!homework[dayIso]) {
          homework[dayIso] = normalizeHomework(payload.homework?.[dayIso]);
        }
      });

      state.raw = payload;
      state.snapshot = {
        week_start: payload.week_start || weekDates[0],
        week_dates: weekDates,
        today: todayIso,
        template,
        days,
        homework,
        settings,
        labels: payload.labels || { weekdays: {}, statuses: clone(STATUS_LABELS) },
        current_lesson: payload.current_lesson || null
      };
      state.selectedDay = state.snapshot.today;
    }

    function markDirty(text = "Есть несохранённые изменения.") {
      state.dirty = true;
      document.getElementById("footerStatus").textContent = text;
      tg.MainButton.setText("Сохранить в боте");
      tg.MainButton.show();
      tg.MainButton.enable();
    }

    function clearDirty(text = "Изменений пока нет.") {
      state.dirty = false;
    }

    function setActiveTab(tabName) {
      state.activeTab = tabName;
      if (tabName === "settings") {
        state.activeSettingsTab = "menu";
      }
      document.querySelectorAll(".tab").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tabName);
      });
      document.querySelectorAll(".screen").forEach((screen) => {
        screen.classList.toggle("active", screen.id === `screen-${tabName}`);
      });
    }

    function updateSummaryStats() {
      return;
    }

    function parseInterval(interval) {
      const [startText, endText] = String(interval || "").split("-");
      if (!startText || !endText) {
        return null;
      }
      const start = parseTimeString(startText);
      const end = parseTimeString(endText);
      return { start, end };
    }

    function computeCurrentLesson() {
      if (!state.snapshot.settings.show_current_lesson) {
        return null;
      }

      const todayIso = new Date().toISOString().slice(0, 10);
      if (todayIso !== state.snapshot.today) {
        return state.snapshot.current_lesson || null;
      }

      const lessons = state.snapshot.days[state.snapshot.today] || [];
      const now = new Date();

      for (const lesson of lessons) {
        if (lesson.status === "cancelled") {
          continue;
        }
        const interval = parseInterval(lesson.time);
        if (!interval) {
          continue;
        }
        const start = new Date();
        start.setHours(interval.start.hour, interval.start.minute, 0, 0);
        const end = new Date();
        end.setHours(interval.end.hour, interval.end.minute, 0, 0);
        if (start <= now && now < end) {
          return lesson;
        }
      }

      return null;
    }

    function getCabinetByLessonName(lessonName) {
      const match = (state.snapshot.settings.subjects || []).find(
        (subject) => subject.name === lessonName
      );
      return match?.cabinet ? String(match.cabinet).trim() : "";
    }

    function getSubjectMeta(lessonName, cabinet = "") {
      const actualCabinet = String(cabinet || "").trim() || getCabinetByLessonName(lessonName);
      return actualCabinet ? `Кабинет: ${actualCabinet}` : "";
    }

    function getTemplateLessonsForDay(dayIso) {
      const weekdayKey = dateToWeekdayKey(dayIso);
      return state.snapshot.template[weekdayKey] || [];
    }

    function getTemplateBackedDay(dayIso) {
      const weekdayKey = dateToWeekdayKey(dayIso);
      return normalizeDay(
        getTemplateLessonsForDay(dayIso).map((lesson, index) => ({
          id: `template-${weekdayKey}-${index + 1}`,
          lesson: typeof lesson === "object" ? lesson.lesson : lesson,
          cabinet: typeof lesson === "object" ? lesson.cabinet : "",
          status: "planned",
          slot: index + 1
        })),
        dayIso,
        state.snapshot.settings,
        state.snapshot.template
      );
    }

    function getDaySlotCount(dayIso) {
      const lessonSlots = normalizeLessonTimes(state.snapshot.settings.lesson_times).length;
      const existingMax = Math.max(
        0,
        ...getTemplateBackedDay(dayIso).map((item) => Number(item.slot) || 0)
      );
      return Math.max(lessonSlots, existingMax);
    }

    function getLessonBySlot(dayIso, slot) {
      return getTemplateBackedDay(dayIso).find((item) => Number(item.slot) === slot) || null;
    }

    function renderLessonCard(item) {
      const subjectMeta = getSubjectMeta(item.lesson, item.cabinet);
      return `
        <div class="lesson-card">
          <div class="row">
            <div class="lesson-main">
              <p class="lesson-title">${escapeHtml(item.lesson)}</p>
              <p class="lesson-meta">${escapeHtml(item.time)}${subjectMeta ? ` • ${escapeHtml(subjectMeta)}` : ""}</p>
            </div>
          </div>
        </div>
      `;
    }

    function getCurrentLessonCard() {
      const current = computeCurrentLesson();
      if (!current) {
        return `
          <div class="lesson-card">
            <div class="lesson-main">
              <p class="lesson-title">Сейчас нет активного урока</p>
              <p class="lesson-meta">Бот покажет текущий урок, если его время совпадает с текущим временем.</p>
            </div>
          </div>
        `;
      }

      return `
        <div class="lesson-card current">
          <div class="row">
            <div class="lesson-main">
              <p class="lesson-title">${escapeHtml(current.lesson)}</p>
              <p class="lesson-meta">Текущий урок по расписанию: ${escapeHtml(current.time)}</p>
            </div>
          </div>
        </div>
      `;
    }

    function getPreviousHomeworkForLesson(dayIso, lessonName) {
      return Object.entries(state.snapshot.homework || {})
        .filter(([sourceDay]) => sourceDay < dayIso)
        .flatMap(([sourceDay, items]) => (items || []).map((item) => ({ ...item, source_day: sourceDay })))
        .filter((item) => item.lesson === lessonName && String(item.task || "").trim())
        .sort((left, right) => left.source_day.localeCompare(right.source_day))
        .at(-1) || null;
    }

    function getOutgoingHomeworkForLesson(dayIso, lessonName, lessonId) {
      return (state.snapshot.homework[dayIso] || []).find((item) => {
        if (lessonId && item.lesson_id) {
          return item.lesson_id === lessonId;
        }
        return item.lesson === lessonName;
      }) || null;
    }

    function buildCompactScheduleSegments(dayIso) {
      const lessons = getTemplateBackedDay(dayIso);
      const now = new Date();
      const isToday = dayIso === state.snapshot.today;
      const segments = [];

      lessons.forEach((lesson, index) => {
        const lessonInterval = parseInterval(lesson.time);
        const subjectMeta = getSubjectMeta(lesson.lesson, lesson.cabinet);
        const lessonActive = isToday && lessonInterval && (() => {
          const start = new Date();
          start.setHours(lessonInterval.start.hour, lessonInterval.start.minute, 0, 0);
          const end = new Date();
          end.setHours(lessonInterval.end.hour, lessonInterval.end.minute, 0, 0);
          return start <= now && now < end;
        })();

        segments.push({
          key: `lesson-${lesson.id}`,
          type: "lesson",
          lessonId: lesson.id,
          active: Boolean(lessonActive),
          title: lesson.lesson || "Без предмета",
          meta: `${lesson.time}${subjectMeta ? ` • ${subjectMeta}` : ""}`
        });

        const nextLesson = lessons[index + 1];
        if (!nextLesson) {
          return;
        }

        const nextInterval = parseInterval(nextLesson.time);
        if (!lessonInterval || !nextInterval) {
          return;
        }

        const currentEnd = new Date();
        currentEnd.setHours(lessonInterval.end.hour, lessonInterval.end.minute, 0, 0);
        const nextStart = new Date();
        nextStart.setHours(nextInterval.start.hour, nextInterval.start.minute, 0, 0);
        if (nextStart <= currentEnd) {
          return;
        }

        const breakActive = isToday && currentEnd <= now && now < nextStart;
        segments.push({
          key: `break-${lesson.id}-${nextLesson.id}`,
          type: "break",
          beforeLessonId: lesson.id,
          nextLessonId: nextLesson.id,
          active: breakActive,
          title: "Перемена",
          meta: `${lessonInterval.end.hour.toString().padStart(2, "0")}:${lessonInterval.end.minute.toString().padStart(2, "0")} - ${nextInterval.start.hour.toString().padStart(2, "0")}:${nextInterval.start.minute.toString().padStart(2, "0")}`
        });
      });

      return segments;
    }

    function getActiveCompactSegment(dayIso) {
      return buildCompactScheduleSegments(dayIso).find((segment) => segment.active) || null;
    }

    function getSelectedCompactSegment(dayIso) {
      const segments = buildCompactScheduleSegments(dayIso);
      if (!segments.length) {
        return null;
      }

      const selected = segments.find((segment) => segment.key === state.selectedCompactKey);
      if (selected) {
        return selected;
      }

      const active = segments.find((segment) => segment.active);
      return active || segments[0];
    }

    function renderCompactSegmentContent(dayIso, segment) {
      if (!segment) {
        return "";
      }

      const isToday = dayIso === state.snapshot.today;

      if (segment.type === "break") {
        return `
          <div class="compact-item-details">
            <div class="homework-mini">
              <p class="homework-title">\u041f\u0435\u0440\u0435\u043c\u0435\u043d\u0430</p>
              <p class="homework-meta">${escapeHtml(segment.meta)}</p>
            </div>
          </div>
        `;
      }

      const lesson = getTemplateBackedDay(dayIso).find((item) => item.id === segment.lessonId);
      if (!lesson) {
        return "";
      }

      const incomingHomework = getPreviousHomeworkForLesson(dayIso, lesson.lesson);
      const outgoingHomework = getOutgoingHomeworkForLesson(dayIso, lesson.lesson, lesson.id);

      return `
        <div class="compact-item-details">
          <div class="lesson-homework">
            <div class="homework-mini">
              <p class="homework-title">\u0414\u0417 \u043d\u0430 \u044d\u0442\u043e\u0442 \u0443\u0440\u043e\u043a</p>
              <p class="homework-meta">${incomingHomework?.task ? escapeHtml(incomingHomework.task) : "\u041d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u0437\u0430\u0434\u0430\u043d\u043e"}</p>
            </div>
            ${isToday ? `
              <label>
                \u0414\u0417 \u0441 \u044d\u0442\u043e\u0433\u043e \u0443\u0440\u043e\u043a\u0430
                <textarea data-outgoing-homework="${escapeAttribute(lesson.id)}" placeholder="\u0427\u0442\u043e \u0437\u0430\u0434\u0430\u043b\u0438 \u043d\u0430 \u044d\u0442\u043e\u043c \u0443\u0440\u043e\u043a\u0435?">${escapeHtml(outgoingHomework?.task || "")}</textarea>
              </label>
            ` : ""}
          </div>
        </div>
      `;
    }

    function renderCompactSchedule(dayIso) {
      const segments = buildCompactScheduleSegments(dayIso);
      if (!segments.length) {
        return "";
      }

      const selectedSegment = getSelectedCompactSegment(dayIso);
      if (selectedSegment) {
        state.selectedCompactKey = selectedSegment.key;
      }

      return `
        <div class="compact-schedule ${dayIso === state.snapshot.today ? "today" : "future"}" id="compactSchedule">
          ${segments.map((segment) => {
            const isSelected = selectedSegment?.key === segment.key;
            return `
              <div class="compact-item ${segment.active ? "active" : ""} ${isSelected ? "current" : ""}" data-compact-key="${escapeAttribute(segment.key)}">
                <p class="compact-item-title">${escapeHtml(segment.title)}</p>
                <p class="compact-item-meta">${escapeHtml(segment.meta)}</p>
                ${isSelected ? renderCompactSegmentContent(dayIso, segment) : ""}
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function scrollCompactScheduleToActive() {
      const container = document.getElementById("compactSchedule");
      const activeItem = container?.querySelector(".compact-item.current, .compact-item.active");
      if (!container || !activeItem) {
        return;
      }

      requestAnimationFrame(() => {
        container.scrollTop = Math.max(0, activeItem.offsetTop - 12);
      });
    }

    function scheduleCompactReturn(dayIso) {
      if (state.compactReturnTimer) {
        clearTimeout(state.compactReturnTimer);
      }

      if (state.compactInputFocused || dayIso !== state.snapshot.today) {
        return;
      }

      state.compactReturnTimer = setTimeout(() => {
        const active = getActiveCompactSegment(dayIso);
        state.selectedCompactKey = active?.key || null;
        renderTodayScreen();
      }, 5000);
    }


    function renderScheduleSlotRow(dayIso, slot) {
      const item = getLessonBySlot(dayIso, slot);
      const subjectNames = normalizeSubjects(state.snapshot.settings.subjects).map((subject) => subject.name);
      const subjectMeta = item ? getSubjectMeta(item.lesson, item.cabinet) : "";
      const hasSubjects = subjectNames.length > 0;
      const slotTime = buildTimeSlotFromSettings(slot - 1, state.snapshot.settings);

      if (!item) {
        return `
          <div class="slot-editor-item empty" data-slot-row="${slot}" data-slot="${slot}">
            <div class="slot-editor-empty">
              <div class="slot-editor-meta">
                <span class="pill">${slot} урок</span>
                <span class="small">${escapeHtml(slotTime)}</span>
              </div>
              <button class="ghost" type="button" data-slot-add="${slot}" ${hasSubjects ? "" : "disabled"}>Добавить урок</button>
            </div>
            <div class="small">${hasSubjects ? "Урока нет." : "Сначала добавьте предметы в настройках."}</div>
          </div>
        `;
      }

      return `
        <div class="slot-editor-item filled" data-slot-row="${slot}" data-slot="${slot}" data-lesson-id="${item.id}" draggable="true">
          <div class="row">
            <div class="slot-editor-meta">
              <span class="pill">${slot} урок</span>
              <span class="small">${escapeHtml(slotTime)}</span>
            </div>
            <div class="slot-editor-actions">
              <span class="drag-handle" title="Перетащить">\u22ee\u22ee</span>
              <button class="danger" type="button" data-slot-remove="${slot}">Убрать</button>
            </div>
          </div>
          <label>
            Предмет
            <select data-slot-lesson="${slot}">
              <option value="">Выберите предмет</option>
              ${subjectNames.map((name) => `<option value="${escapeAttribute(name)}" ${item.lesson === name ? "selected" : ""}>${escapeHtml(name)}</option>`).join("")}
              ${item.lesson && !subjectNames.includes(item.lesson) ? `<option value="${escapeAttribute(item.lesson)}" selected>${escapeHtml(item.lesson)}</option>` : ""}
            </select>
          </label>
          <label>
            Кабинет
            <input type="text" value="${escapeAttribute(item.cabinet || "")}" data-slot-cabinet="${slot}" placeholder="Кабинет">
          </label>
          <div class="small">${subjectMeta ? escapeHtml(subjectMeta) : "Кабинет не указан."}</div>
        </div>
      `;
    }

    function renderScheduleSlotEditor(dayIso) {
      const slotCount = getDaySlotCount(dayIso);
      if (!slotCount) {
        return `
          <div class="day-card">
            <div class="empty">Сначала задайте расписание звонков в настройках.</div>
          </div>
        `;
      }

      return `
        <div class="day-card">
          <div class="slot-editor" id="scheduleLessonList">
            ${Array.from({ length: slotCount }, (_, index) => renderScheduleSlotRow(dayIso, index + 1)).join("")}
          </div>
        </div>
      `;
    }

    function renderTodayScreen() {
      const container = document.getElementById("screen-today");
      const scheduleDates = getScheduleDates();
      const selectedIndex = Math.max(0, scheduleDates.indexOf(state.selectedDay || state.snapshot.today));
      const dayIso = scheduleDates[selectedIndex] || state.snapshot.today;
      const isToday = dayIso === state.snapshot.today;
      const nextIndex = selectedIndex + 1;
      const prevIndex = selectedIndex - 1;

      container.innerHTML = `
        <div class="stack">
          <div class="day-switcher">
            <div class="day-switcher-actions">
              <button class="day-arrow" id="schedulePrevDay" type="button" ${prevIndex < 0 ? "disabled" : ""}>‹</button>
            </div>
            <div class="day-switcher-meta">
              <strong>${escapeHtml(formatHumanDate(dayIso))}</strong>
              <div class="small">${isToday ? "Сегодня" : "Завтра"}</div>
            </div>
            <div class="day-switcher-actions">
              <button class="ghost" id="toggleScheduleEditButton" type="button">${state.scheduleEditMode ? "Готово" : "Редактировать"}</button>
              <button class="day-arrow" id="scheduleNextDay" type="button" ${nextIndex >= scheduleDates.length ? "disabled" : ""}>›</button>
            </div>
          </div>
          ${state.scheduleEditMode ? renderScheduleSlotEditor(dayIso) : `
            ${renderCompactSchedule(dayIso)}
          `}
        </div>
      `;

      document.getElementById("schedulePrevDay").addEventListener("click", () => {
        if (prevIndex < 0) {
          return;
        }
        state.selectedDay = scheduleDates[prevIndex];
        state.selectedCompactKey = null;
        renderTodayScreen();
      });
      document.getElementById("scheduleNextDay").addEventListener("click", () => {
        if (nextIndex >= scheduleDates.length) {
          return;
        }
        state.selectedDay = scheduleDates[nextIndex];
        state.selectedCompactKey = null;
        renderTodayScreen();
      });
      document.getElementById("toggleScheduleEditButton").addEventListener("click", () => {
        state.scheduleEditMode = !state.scheduleEditMode;
        renderTodayScreen();
      });

      if (state.scheduleEditMode) {
        bindScheduleSlotEvents(dayIso);
        bindScheduleDragAndDrop(dayIso);
      } else {
        bindHomeworkInlineEvents(dayIso);
        bindCompactScheduleInteractions(dayIso);
      }

      if (isToday && !state.scheduleEditMode) {
        scrollCompactScheduleToActive();
      }
    }

    function renderWeekDayCard(dayIso) {
      const lessons = state.snapshot.days[dayIso] || [];
      const homework = state.snapshot.homework[dayIso] || [];
      const changedCount = lessons.filter((item) => item.status === "changed" || item.status === "added").length;
      const cancelledCount = lessons.filter((item) => item.status === "cancelled").length;

      return `
        <div class="day-card">
          <div class="section-head">

    function bindEditorItemEvents(dayIso, rootSelector = "#editorLessonList") {
      document.querySelectorAll(`${rootSelector} .editor-item`).forEach((element) => {
        const index = Number(element.dataset.index);
        const lessonInput = element.querySelector('[data-field="lesson"]');
        const cabinetInput = element.querySelector('[data-field="cabinet"]');

        lessonInput.addEventListener("change", (event) => {
          const previousLesson = state.snapshot.days[dayIso][index].lesson;
          state.snapshot.days[dayIso][index].lesson = event.target.value;
          (state.snapshot.homework[dayIso] || []).forEach((entry) => {
            if (entry.lesson_id && entry.lesson_id === state.snapshot.days[dayIso][index].id) {
              entry.lesson = event.target.value;
            } else if (!entry.lesson_id && entry.lesson === previousLesson) {
              entry.lesson = event.target.value;
            }
          });
          markDirty("\u0418\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u0432 \u0440\u0430\u0441\u043f\u0438\u0441\u0430\u043d\u0438\u0438 \u0435\u0449\u0451 \u043d\u0435 \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u044b.");
          renderTodayScreen();
        });

        cabinetInput?.addEventListener("input", (event) => {
          state.snapshot.days[dayIso][index].cabinet = event.target.value;
          markDirty("Кабинет обновлён.");
          renderTodayScreen();
        });

        element.querySelector('[data-remove="true"]').addEventListener("click", () => {
          state.snapshot.days[dayIso].splice(index, 1);
          refreshDay(dayIso);
          markDirty("\u0423\u0440\u043e\u043a \u0443\u0434\u0430\u043b\u0451\u043d \u0438\u0437 \u0447\u0435\u0440\u043d\u043e\u0432\u0438\u043a\u0430.");
        });

        element.querySelectorAll("[data-move]").forEach((button) => {
          button.addEventListener("click", () => {
            const direction = button.dataset.move;
            const nextIndex = direction === "up" ? index - 1 : index + 1;
            if (nextIndex < 0 || nextIndex >= state.snapshot.days[dayIso].length) {
              return;
            }
            const items = state.snapshot.days[dayIso];
            [items[index], items[nextIndex]] = [items[nextIndex], items[index]];
            refreshDay(dayIso);
            markDirty("\u041f\u043e\u0440\u044f\u0434\u043e\u043a \u0443\u0440\u043e\u043a\u043e\u0432 \u0438\u0437\u043c\u0435\u043d\u0451\u043d.");
          });
        });
      });
    }

    function bindHomeworkInlineEvents(dayIso) {
      document.querySelectorAll("[data-outgoing-homework]").forEach((textarea) => {
        ["mousedown", "click", "touchstart"].forEach((eventName) => {
          textarea.addEventListener(eventName, (event) => {
            event.stopPropagation();
          });
        });

        textarea.addEventListener("focus", () => {
          state.compactInputFocused = true;
          if (state.compactReturnTimer) {
            clearTimeout(state.compactReturnTimer);
            state.compactReturnTimer = null;
          }
        });

        textarea.addEventListener("blur", () => {
          state.compactInputFocused = false;
          scheduleCompactReturn(dayIso);
        });

        textarea.addEventListener("input", (event) => {
          const lessonId = event.target.dataset.outgoingHomework;
          const lesson = getTemplateBackedDay(dayIso).find((item) => item.id === lessonId);
          if (!lesson) {
            return;
          }

          const items = state.snapshot.homework[dayIso] || [];
          const existing = items.find((entry) => {
            if (entry.lesson_id) {
              return entry.lesson_id === lessonId;
            }
            return entry.lesson === lesson.lesson;
          });
          const task = event.target.value;

          if (!task.trim()) {
            state.snapshot.homework[dayIso] = items.filter((entry) => {
              if (entry.lesson_id) {
                return entry.lesson_id !== lessonId;
              }
              return entry.lesson !== lesson.lesson;
            });
            markDirty("Домашка с урока очищена.");
            return;
          }

          if (existing) {
            existing.task = task;
            existing.lesson = lesson.lesson;
          } else {
            items.push({
              id: crypto.randomUUID(),
              lesson_id: lessonId,
              lesson: lesson.lesson,
              task,
              done: false
            });
            state.snapshot.homework[dayIso] = items;
          }

          markDirty("Домашка с урока обновлена.");
        });
      });
    }

    function bindScheduleSlotEvents(dayIso) {
      document.querySelectorAll("[data-slot-add]").forEach((button) => {
        button.addEventListener("click", () => {
          const slot = Number(button.dataset.slotAdd);
          const firstSubject = normalizeSubjects(state.snapshot.settings.subjects)[0]?.name;
          if (!firstSubject) {
            return;
          }

          const templateLessons = getTemplateLessonsForDay(dayIso);
          const insertIndex = Math.max(0, Math.min(templateLessons.length, slot - 1));
          templateLessons.splice(insertIndex, 0, { lesson: firstSubject, cabinet: getCabinetByLessonName(firstSubject) });
          renderTodayScreen();
          markDirty("\u0420\u0430\u0441\u043f\u0438\u0441\u0430\u043d\u0438\u0435 \u0442\u0435\u043a\u0443\u0449\u0435\u0439 \u0432\u043a\u043b\u0430\u0434\u043a\u0438 \u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u043e \u0438\u0437 \u0448\u0430\u0431\u043b\u043e\u043d\u0430.");
        });
      });

      document.querySelectorAll("[data-slot-lesson]").forEach((select) => {
        select.addEventListener("change", (event) => {
          const slot = Number(event.target.dataset.slotLesson);
          const lesson = getLessonBySlot(dayIso, slot);
          if (!lesson) {
            return;
          }

          const templateLessons = getTemplateLessonsForDay(dayIso);
          const previousLesson = lesson.lesson;
          templateLessons[slot - 1] = { ...normalizeTemplateLessonEntry(templateLessons[slot - 1]), lesson: event.target.value };
          (state.snapshot.homework[dayIso] || []).forEach((entry) => {
            if (entry.lesson_id && entry.lesson_id === lesson.id) {
              entry.lesson = event.target.value;
            } else if (!entry.lesson_id && entry.lesson === previousLesson) {
              entry.lesson = event.target.value;
            }
          });

          renderTodayScreen();
          markDirty("\u0420\u0430\u0441\u043f\u0438\u0441\u0430\u043d\u0438\u0435 \u0442\u0435\u043a\u0443\u0449\u0435\u0439 \u0432\u043a\u043b\u0430\u0434\u043a\u0438 \u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u043e \u0438\u0437 \u0448\u0430\u0431\u043b\u043e\u043d\u0430.");
        });
      });

      document.querySelectorAll("[data-slot-cabinet]").forEach((input) => {
        input.addEventListener("input", (event) => {
          const slot = Number(event.target.dataset.slotCabinet);
          const templateLessons = getTemplateLessonsForDay(dayIso);
          templateLessons[slot - 1] = {
            ...normalizeTemplateLessonEntry(templateLessons[slot - 1]),
            cabinet: event.target.value
          };
          renderTodayScreen();
          markDirty("\u041a\u0430\u0431\u0438\u043d\u0435\u0442 \u043e\u0431\u043d\u043e\u0432\u043b\u0451\u043d.");
        });
      });

      document.querySelectorAll("[data-slot-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          const slot = Number(button.dataset.slotRemove);
          const lesson = getLessonBySlot(dayIso, slot);
          if (!lesson) {
            return;
          }

          const templateLessons = getTemplateLessonsForDay(dayIso);
          templateLessons.splice(slot - 1, 1);
          state.snapshot.homework[dayIso] = (state.snapshot.homework[dayIso] || []).filter(
            (entry) => entry.lesson_id !== lesson.id
          );
          renderTodayScreen();
          markDirty("\u0420\u0430\u0441\u043f\u0438\u0441\u0430\u043d\u0438\u0435 \u0442\u0435\u043a\u0443\u0449\u0435\u0439 \u0432\u043a\u043b\u0430\u0434\u043a\u0438 \u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u043e \u0438\u0437 \u0448\u0430\u0431\u043b\u043e\u043d\u0430.");
        });
      });
    }

    function bindCompactScheduleInteractions(dayIso) {
      const container = document.getElementById("compactSchedule");
      if (!container) {
        return;

      container.querySelectorAll(".compact-item").forEach((item) => {
        item.addEventListener("click", (event) => {
          if (event.target.closest("textarea, input, select, label, button")) {
            return;
          }
          state.selectedCompactKey = item.dataset.compactKey;
          renderTodayScreen();
          scheduleCompactReturn(dayIso);
        });
      });

      const deferReturn = () => scheduleCompactReturn(dayIso);
      container.addEventListener("wheel", deferReturn, { passive: true });
      container.addEventListener("scroll", deferReturn, { passive: true });
      container.addEventListener("touchmove", deferReturn, { passive: true });

    function bindScheduleDragAndDrop(dayIso) {
      const rows = document.querySelectorAll("#scheduleLessonList [data-slot-row]");
      rows.forEach((element) => {
        const lessonId = element.dataset.lessonId;

        if (lessonId) {
          element.addEventListener("dragstart", () => {
            state.draggedLessonId = lessonId;
            element.classList.add("dragging");
          });

          element.addEventListener("dragend", () => {
            state.draggedLessonId = null;
            element.classList.remove("dragging");
          });
        }

        element.addEventListener("dragover", (event) => {
          if (!state.draggedLessonId) {
            return;
          }
          event.preventDefault();
        });

        element.addEventListener("drop", (event) => {
          if (!state.draggedLessonId) {
            return;
          }
          event.preventDefault();
          const lessonItems = getTemplateBackedDay(dayIso);
          const draggedLesson = lessonItems.find((item) => item.id === state.draggedLessonId);
          const targetSlot = Number(element.dataset.slot);
          if (!draggedLesson || !targetSlot || Number(draggedLesson.slot) === targetSlot) {
            return;
          }

          const templateLessons = getTemplateLessonsForDay(dayIso);
          const fromIndex = draggedLesson.slot - 1;
          const toIndex = Math.max(0, Math.min(templateLessons.length - 1, targetSlot - 1));
          const [movedLesson] = templateLessons.splice(fromIndex, 1);
          templateLessons.splice(toIndex, 0, movedLesson);

          renderTodayScreen();
          markDirty("\u0420\u0430\u0441\u043f\u0438\u0441\u0430\u043d\u0438\u0435 \u0442\u0435\u043a\u0443\u0449\u0435\u0439 \u0432\u043a\u043b\u0430\u0434\u043a\u0438 \u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u043e \u0438\u0437 \u0448\u0430\u0431\u043b\u043e\u043d\u0430.");
        });
      });
    }

    function renderTemplateLessonOptions(selectedLesson) {
      const subjects = normalizeSubjects(state.snapshot.settings.subjects);
      const subjectNames = subjects.map((subject) => subject.name);
      const options = ['<option value="">Выберите предмет</option>'];

      subjectNames.forEach((name) => {
        options.push(
          `<option value="${escapeAttribute(name)}" ${selectedLesson === name ? "selected" : ""}>${escapeHtml(name)}</option>`
        );

      if (selectedLesson && !subjectNames.includes(selectedLesson)) {
        options.push(
          `<option value="${escapeAttribute(selectedLesson)}" selected>${escapeHtml(selectedLesson)}</option>`
        );
      }

      return options.join("");
    }

                <p class="hint">Здесь задаются название предмета и кабинет.</p>
              </div>
              <button class="ghost" id="addSubjectButton" type="button">+ Добавить предмет</button>
            </div>
            <div class="stack">
              ${subjects.length ? subjects.map((subject, index) => renderSubjectRow(subject, index)).join("") : '<div class="empty">Список предметов пока пуст.</div>'}
            </div>
          </div>
        `;
      }

      return `
        <div class="template-card">
          <button class="ghost settings-back" data-settings-back="menu" type="button">Назад</button>
          <div class="section-head">
            <div>
              <h2>Шаблон расписания</h2>
              <p class="hint">Все дни идут столбиком. Для каждого дня можно добавить урок рядом с названием.</p>
            </div>
          </div>
          <div class="stack" id="templateList">
            ${WEEKDAY_KEYS.map((weekday) => renderTemplateDay(weekday, template[weekday] || [])).join("")}
          </div>
        </div>
      `;
    }

    function bindSettingsEvents() {
      document.querySelectorAll("[data-settings-open]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeSettingsTab = button.dataset.settingsOpen;
          renderSettingsScreen();
        });
      });

      document.querySelectorAll("[data-settings-back]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeSettingsTab = button.dataset.settingsBack || "menu";
          renderSettingsScreen();
        });
      });

      const addLessonTimeButton = document.getElementById("addLessonTimeButton");
      if (addLessonTimeButton) {
        addLessonTimeButton.addEventListener("click", () => {
          const lessonTimes = normalizeLessonTimes(state.snapshot.settings.lesson_times);
          const nextSlot = lessonTimes.length
            ? buildGeneratedTimeSlot(lessonTimes.length).split("-")
            : ["08:30", "09:15"];
          lessonTimes.push({ start: nextSlot[0], end: nextSlot[1] });
          state.snapshot.settings.lesson_times = lessonTimes;
          renderSettingsScreen();
          recalculateAllTimes();
          markDirty("Добавлен новый интервал звонков.");
        });
      }

      document.querySelectorAll("[data-time-index]").forEach((row) => {
        const index = Number(row.dataset.timeIndex);
        row.querySelector('[data-time-field="start"]').addEventListener("input", (event) => {
          state.snapshot.settings.lesson_times[index].start = event.target.value || "08:30";
          recalculateAllTimes();
          markDirty("Время начала урока обновлено.");
        });
        row.querySelector('[data-time-field="end"]').addEventListener("input", (event) => {
          state.snapshot.settings.lesson_times[index].end = event.target.value || "09:15";
          recalculateAllTimes();
          markDirty("Время окончания урока обновлено.");
        });
      });

      document.querySelectorAll("[data-time-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.timeRemove);
          state.snapshot.settings.lesson_times.splice(index, 1);
          state.snapshot.settings.lesson_times = normalizeLessonTimes(state.snapshot.settings.lesson_times);
          renderSettingsScreen();
          recalculateAllTimes();
          markDirty("Интервал звонков удалён.");
        });
      });

      const addSubjectButton = document.getElementById("addSubjectButton");
      if (addSubjectButton) {
        addSubjectButton.addEventListener("click", () => {
          state.snapshot.settings.subjects.push({ name: "Новый предмет", cabinet: "" });
          renderSettingsScreen();
          markDirty("Предмет добавлен.");
        });
      }

      document.querySelectorAll("[data-subject-index]").forEach((row) => {
        const index = Number(row.dataset.subjectIndex);
        row.querySelector('[data-subject-field="name"]').addEventListener("input", (event) => {
          state.snapshot.settings.subjects[index].name = event.target.value;
          markDirty("Список предметов обновлён.");
        });
        row.querySelector('[data-subject-field="cabinet"]').addEventListener("input", (event) => {
          state.snapshot.settings.subjects[index].cabinet = event.target.value;
          markDirty("Кабинет предмета обновлён.");
        });
      });

      document.querySelectorAll("[data-subject-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.subjectRemove);
          state.snapshot.settings.subjects.splice(index, 1);
          state.snapshot.settings.subjects = normalizeSubjects(state.snapshot.settings.subjects);
          renderSettingsScreen();
          markDirty("Предмет удалён.");
        });
      });
    }

    function bindTemplateEvents() {
      document.querySelectorAll("[data-template-field]").forEach((input) => {
        input.addEventListener("change", () => {
          const container = input.closest(".template-item");
          const weekday = container.dataset.weekday;
          const rows = Array.from(container.querySelectorAll("[data-template-index]"));
          state.snapshot.template[weekday] = rows
            .map((row) => ({
              lesson: String(row.querySelector('[data-template-field="lesson"]')?.value || "").trim(),
              cabinet: String(row.querySelector('[data-template-field="cabinet"]')?.value || "").trim()
            }))
            .filter((item) => item.lesson);
          markDirty("Шаблон недели обновлён.");
        });
      });

      document.querySelectorAll("[data-template-add]").forEach((button) => {
        button.addEventListener("click", () => {
          const weekday = button.dataset.templateAdd;
          const firstSubject = normalizeSubjects(state.snapshot.settings.subjects)[0]?.name || "";
          if (!firstSubject) {
            return;
          }
          state.snapshot.template[weekday].push({ lesson: firstSubject, cabinet: getCabinetByLessonName(firstSubject) });
          renderSettingsScreen();
          markDirty("Урок добавлен в шаблон недели.");
        });
      });

      document.querySelectorAll("[data-template-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          const weekday = button.dataset.templateRemove;
          const index = Number(button.dataset.templateIndex);
          state.snapshot.template[weekday].splice(index, 1);
          renderSettingsScreen();
          markDirty("Предмет удалён из шаблона недели.");
        });
      });
    }

    function renderSettingsScreen() {
      const container = document.getElementById("screen-settings");
      if (state.activeSettingsTab === "menu") {
        container.innerHTML = `
          <div class="section-head">
            <div>
              <h2>Настройки</h2>
              <p class="hint">Выберите страницу настроек.</p>
            </div>
          </div>
          <div class="stack">
            ${renderSettingsSection()}
          </div>
        `;
      } else {
        container.innerHTML = renderSettingsSection();
      }

      bindSettingsEvents();
      bindTemplateEvents();
    }

    function renderScreens() {
      renderTodayScreen();
      renderSettingsScreen();
    }

    function prepareSnapshotForSend() {
      const cleanedDays = {};
      const cleanedHomework = {};

      Object.keys(state.snapshot.days).forEach((dayIso) => {
        cleanedDays[dayIso] = normalizeDay(
          state.snapshot.days[dayIso],
          dayIso,
          state.snapshot.settings,
          state.snapshot.template
        ).map(({ id, lesson, cabinet, status, time, slot }) => ({
          id,
          lesson: lesson.trim(),
          cabinet: String(cabinet || "").trim(),
          status,
          slot,
          time
        }));
      });

      Object.keys(state.snapshot.homework).forEach((dayIso) => {
        cleanedHomework[dayIso] = normalizeHomework(state.snapshot.homework[dayIso]).map((item) => ({
          id: item.id,
          lesson_id: item.lesson_id || "",
          lesson: item.lesson.trim(),
          task: item.task.trim(),
          done: Boolean(item.done)
        }));
      });

      const cleanedTemplate = {};
      WEEKDAY_KEYS.forEach((weekday) => {
        cleanedTemplate[weekday] = (state.snapshot.template[weekday] || [])
          .map((lesson) => normalizeTemplateLessonEntry(lesson))
          .filter((lesson) => lesson.lesson)
          .map((lesson) => ({
            lesson: lesson.lesson.trim(),
            cabinet: lesson.cabinet.trim()
          }));
      });

      return {
        action: "save_week_snapshot",
        snapshot: {
          week_start: state.snapshot.week_start,
          template: cleanedTemplate,
          days: cleanedDays,
          homework: cleanedHomework,
          settings: {
            notifications: Boolean(state.snapshot.settings.notifications),
            show_current_lesson: Boolean(state.snapshot.settings.show_current_lesson),
            lesson_times: normalizeLessonTimes(state.snapshot.settings.lesson_times),
            subjects: normalizeSubjects(state.snapshot.settings.subjects)
          }
        }
      };
    }

    function saveToBot() {
      const payload = prepareSnapshotForSend();
      tg.sendData(JSON.stringify(payload));
      clearDirty("Изменения отправлены боту.");
      tg.close();
    }

    function resetDraft() {
      ensureSnapshot();
      updateSummaryStats();
      renderScreens();
      clearDirty("Черновик сброшен до последнего состояния из бота.");
    }

    document.getElementById("tabbar").addEventListener("click", (event) => {
      const button = event.target.closest(".tab");
      if (!button) {
        return;
      }
      setActiveTab(button.dataset.tab);
    });

    ensureSnapshot();
    updateSummaryStats();
    renderScreens();
    setActiveTab(state.activeTab);
    clearDirty();

    setInterval(() => {
      if (state.activeTab === "today" && !state.scheduleEditMode) {
        renderTodayScreen();
      }
    }, 30000);
  </script>
</body>
</html>
